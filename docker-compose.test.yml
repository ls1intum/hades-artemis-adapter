version: "3.8"

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    command:
      - --configFile=/etc/traefik/traefik.yml
      - --certificatesresolvers.letsencrypt.acme.email=${LETSENCRYPT_EMAIL}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./traefik/acme.json:/etc/traefik/acme.json
    restart: unless-stopped
    networks:
      - hades

  hadesArtemisAdapter:
    image: ghcr.io/ls1intum/hades/hades-artemis-adapter:${IMAGE_TAG:-latest}
    ports: []
    expose:
      - "8082"
    networks:
      - hades
    environment:
      - API_PORT=8082
      - ARTEMIS_BASE_URL=${ARTEMIS_BASE_URL}
      - ARTEMIS_NEW_RESULT_ENDPOINT=${ARTEMIS_NEW_RESULT_ENDPOINT}
      - ARTEMIS_AUTH_TOKEN=${ARTEMIS_AUTH_TOKEN}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hadesadapter.rule=Host(`${HADES_ADAPTER_HOST:-adapter.${HADES_API_HOST}}`)"
      - "traefik.http.routers.hadesadapter.entrypoints=web,websecure"
      - "traefik.http.routers.hadesadapter.tls.certresolver=letsencrypt"
      - "traefik.http.services.hadesadapter.loadbalancer.server.port=8082"
    restart: unless-stopped

networks:
  hades:
    external: false
